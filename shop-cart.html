<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Shopping Cart | Foodtruck Restaurant</title>

    <meta name="description"
        content="View your Foodtruck Restaurant shopping cart, update meal quantities, apply coupon codes, and proceed to checkout for your selected food items." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />

    <link href="./assets/css/output.css" rel="stylesheet" />
</head>

<body>

    <header class="bg-background text-foreground fixed top-0 left-0 w-full z-50 py-5.25 md:py-7.25">
        <div class="container px-6 md:px-0">
            <div class="row justify-between">
                <img src="./assets/img/shop-cart/header-img/list.svg" alt="list"
                    class="block md:hidden cursor-pointer smooth hover:scale-110" />
                <a href="./index.html"
                    class="font-bold leading-4 md:leading-6 lg:leading-8 text-[18px] md:text-[22px] lg:text-[24px] smooth hover:text-primary hover:tracking-wide">Food<span>truck</span></a>

                <nav class="hidden md:block">
                    <ul class="row gap-8">
                        <li>
                            <a href="./index.html" class="nav-link">Home</a>
                        </li>

                        <li>
                            <a href="./menu.html" class="nav-link">Menu</a>
                        </li>

                        <li>
                            <a href="#" class="nav-link">Blog</a>
                        </li>

                        <li>
                            <a href="#" class="nav-link">Pages</a>
                        </li>

                        <li>
                            <a href="./shop-list.html" class="nav-link">Shop</a>
                        </li>

                        <li>
                            <a href="#" class="nav-link">Contact</a>
                        </li>
                    </ul>
                </nav>

                <div class="icons row gap-4">
                    <a href="#">
                        <img src="./assets/img/shop-cart/header-img/Search.svg" alt="search" class="header-icon" />
                    </a>

                    <a href="#">
                        <img src="./assets/img/shop-cart/header-img/User.svg" alt="user" class="header-icon" />
                    </a>

                    <a href="shop-cart.html">
                        <img src="./assets/img/shop-cart/header-img/cartBag.svg" alt="cart bag" class="header-icon" />
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>

        <section
            class="text-white hero relative bg-[url('./../img/shop-cart/hero-img/heroBackground.webp')] bg-cover bg-center bg-no-repeat pt-40 md:pt-45 lg:pt-49.5 pb-20 md:pb-22 lg:pb-27 text-center overflow-hidden">
            <div class="absolute inset-0 bg-background/30"></div>
            <div class="container relative z-10 px-6 md:px-0">
                <h1 class="h2-style pb-4 md:pb-6 lg:pb-7">Shopping Cart</h1>
                <div class="links row text-center justify-center gap-2 group">
                    <a href="./index.html" class="hero-link">Home</a>
                    <img src="./assets/img/shop-cart/hero-img/CaretRight.svg" alt="Caret Right"
                        class="smooth group-hover:translate-x-1" />
                    <a href="./shop-cart.html" class="hero-link text-primary">Shopping cart</a>
                </div>
            </div>
        </section>

        <section class="cart-section py-20 md:py-30">
            <div class="container px-6 md:px-0">
                <div class="cart-table">
                    <div class="cart-head">
                        <h6 class="h6-style items-start">Product</h6>
                        <h6 class="h6-style">Price</h6>
                        <h6 class="h6-style">Quantity</h6>
                        <h6 class="h6-style">Total</h6>
                        <h6 class="h6-style">Remove</h6>
                    </div>

                    <div class="cart-row">
                        <div class="cart-product">
                            <img src="./assets/img/shop-cart/cart-img/burgar.webp" alt="Burger">
                            <div class="cart-product-info">
                                <h6>Burger</h6>
                                <div class="star-imgs">
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star-primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                </div>
                            </div>
                        </div>

                        <p class="cart-price">$35.00</p>
                        <form class="cart-quantity">
                            <button type="button">−</button>
                            <span>1</span>
                            <button type="button">+</button>
                        </form>
                        <span class="cart-total">$221.00</span>
                        <button class="cart-remove" type="button">×</button>
                    </div>

                    <div class="cart-row">
                        <div class="cart-product">
                            <img src="./assets/img/shop-cart/cart-img/Fresh Lime.webp" alt="fresh-lime">
                            <div class="cart-product-info">
                                <h6>Fresh Lime</h6>
                                <div class="star-imgs">
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star-primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                </div>
                            </div>
                        </div>

                        <p class="cart-price">$25.00</ح>
                        <form class="cart-quantity">
                            <button type="button">−</button>
                            <span>1</span>
                            <button type="button">+</button>
                        </form>
                        <span class="cart-total">$521.00</span>
                        <button class="cart-remove" type="button">×</button>
                    </div>

                    <div class="cart-row">
                        <div class="cart-product">
                            <img src="./assets/img/shop-cart/cart-img/Pizza.webp" alt="Pizza">
                            <div class="cart-product-info">
                                <h6>Pizza</h6>
                                <div class="star-imgs">
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star-primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                </div>
                            </div>
                        </div>

                        <p class="cart-price">$15.00</p>
                        <form class="cart-quantity">
                            <button type="button">−</button>
                            <span>1</span>
                            <button type="button">+</button>
                        </form>
                        <span class="cart-total">$421.00</span>
                        <button class="cart-remove" type="button">×</button>
                    </div>

                    <div class="cart-row">
                        <div class="cart-product">
                            <img src="./assets/img/shop-cart/cart-img/Chocolate Muffin.webp" alt="Chocolate Muffin">
                            <div class="cart-product-info">
                                <h6>Chocolate Muffin</h6>
                                <div class="star-imgs">
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star-primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                </div>
                            </div>
                        </div>

                        <p class="cart-price">$45.00</p>
                        <form class="cart-quantity">
                            <button type="button">−</button>
                            <span>1</span>
                            <button type="button">+</button>
                        </form>
                        <span class="cart-total">$521.00</span>
                        <button class="cart-remove" type="button">×</button>
                    </div>

                    <div class="cart-row">
                        <div class="cart-product">
                            <img src="./assets/img/shop-cart/cart-img/Cheese Butter.webp" alt="Cheese Butter">
                            <div class="cart-product-info">
                                <h6>Cheese Butter</h6>
                                <div class="star-imgs">
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_primary.svg" alt="star-primary" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                    <img src="./assets/img/shop-cart/cart-img/Star_gray.svg" alt="star-gray" />
                                </div>
                            </div>
                        </div>

                        <p class="cart-price">$15.00</p>
                        <form class="cart-quantity">
                            <button type="button">−</button>
                            <span>1</span>
                            <button type="button">+</button>
                        </form>
                        <span class="cart-total">$325.00</span>
                        <button class="cart-remove" type="button">×</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
